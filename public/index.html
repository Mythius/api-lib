<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth Server</title>
  <script src="api.js"></script>
</head>
<body>
  <h2>Centralized Auth Server</h2>
  <p>This server issues signed JWTs to registered client apps after OAuth.</p>
  <hr>
  <h3>Test Login (client: <code>app1</code>)</h3>
  <button onclick="googleOAuth('app1', 'http://localhost:3001/auth/callback')">
    Sign in with Google
  </button>
  <button onclick="microsoftOAuth('app1', 'http://localhost:3001/auth/callback')">
    Sign in with Microsoft
  </button>
  <hr>
  <h3>Verify a Token</h3>
  <textarea id="token-input" rows="4" cols="60" placeholder="Paste a token here..."></textarea>
  <br>
  <button onclick="testVerify()">Verify Token</button>
  <pre id="verify-result"></pre>

  <script>
    async function testVerify() {
      const token = document.getElementById("token-input").value.trim();
      const result = await verifyAuthToken(token);
      document.getElementById("verify-result").textContent = JSON.stringify(result, null, 2);
    }
  </script>
</body>
</html>
